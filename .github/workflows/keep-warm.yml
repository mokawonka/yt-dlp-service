name: Keep yt-dlp service warm

on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping yt-dlp service
        run: |
          response=$(curl -s -o /dev/null -w "%{http_code}" ${{ secrets.RENDER_URL }}/health)
          echo "Response code: $response"
          if [ "$response" != "200" ]; then
            echo "Warning: service returned $response"
          else
            echo "Service is warm ✓"
          fi