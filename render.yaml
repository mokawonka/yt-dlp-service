services:
  - type: web
    name: yt-dlp-service
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn main:app --bind 0.0.0.0:$PORT --workers 2 --timeout 120
    envVars:
      - key: API_KEY
        sync: false  # you'll set this manually in Render dashboard